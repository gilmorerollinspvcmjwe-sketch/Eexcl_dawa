<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>奇幻战线 - 兵种预览</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Microsoft YaHei', sans-serif;
      background: #1a1a2e;
      color: #eee;
      padding: 20px;
    }
    h1 {
      text-align: center;
      margin-bottom: 30px;
      color: #FFD700;
      font-size: 28px;
    }
    .role-section {
      margin-bottom: 40px;
    }
    .role-title {
      font-size: 20px;
      color: #4A90D9;
      margin-bottom: 15px;
      padding-left: 10px;
      border-left: 4px solid #4A90D9;
    }
    .unit-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap: 15px;
    }
    .unit-card {
      background: #16213e;
      border-radius: 8px;
      padding: 15px;
      text-align: center;
      transition: transform 0.2s;
    }
    .unit-card:hover {
      transform: scale(1.05);
    }
    .unit-card canvas {
      background: #0f3460;
      border-radius: 4px;
      margin-bottom: 10px;
    }
    .unit-name {
      font-size: 14px;
      color: #eee;
      margin-bottom: 5px;
    }
    .unit-role {
      font-size: 12px;
      color: #888;
    }
    .role-tank { border-top: 3px solid #808080; }
    .role-melee { border-top: 3px solid #CD853F; }
    .role-ranged { border-top: 3px solid #228B22; }
    .role-magic { border-top: 3px solid #9C27B0; }
    .role-air { border-top: 3px solid #87CEEB; }
    .role-boss { border-top: 3px solid #FF4500; }
  </style>
</head>
<body>
  <h1>奇幻战线对推 - 兵种预览</h1>
  <div id="container"></div>

  <script>
    // 兵种配置
    const COLORS = {
      player: { body: '#4A90D9', detail: '#2C5F8A', weapon: '#8B7355' },
      enemy: { body: '#D94A4A', detail: '#8A2C2C', weapon: '#735555' },
      goblin: { body: '#6B8E23', detail: '#556B2F' },
      orc: { body: '#556B2F', detail: '#3B4A1F' },
      undead: { body: '#8B8682', detail: '#6B6561' },
      ice: { body: '#87CEEB', detail: '#5F9EA0' },
      fire: { body: '#FF6347', detail: '#CC4F35' },
      dragon: { body: '#DC143C', detail: '#8B0000' },
      tree: { body: '#8B4513', detail: '#654321' },
      stone: { body: '#808080', detail: '#606060' },
    };

    const UNIT_CONFIGS = {
      goblin_shield: { id: 'goblin_shield', name: '哥布林盾兵', role: 'tank', bodyColor: COLORS.goblin.body, detailColor: COLORS.goblin.detail, weaponColor: '#8B7355', size: 28 },
      orc_heavy: { id: 'orc_heavy', name: '兽人重甲兵', role: 'tank', bodyColor: COLORS.orc.body, detailColor: COLORS.orc.detail, weaponColor: '#666666', size: 35 },
      stone_guard: { id: 'stone_guard', name: '石像卫士', role: 'tank', bodyColor: COLORS.stone.body, detailColor: COLORS.stone.detail, weaponColor: '#999999', size: 38 },
      dwarf_ironwall: { id: 'dwarf_ironwall', name: '铁壁矮人', role: 'tank', bodyColor: '#B8860B', detailColor: '#8B6914', weaponColor: '#666666', size: 25 },
      wolf_rider: { id: 'wolf_rider', name: '狼骑兵', role: 'melee', bodyColor: '#696969', detailColor: '#4A4A4A', weaponColor: '#8B7355', size: 30 },
      berserker: { id: 'berserker', name: '狂战士', role: 'melee', bodyColor: '#CD853F', detailColor: '#A0522D', weaponColor: '#8B7355', size: 32 },
      crypt_crawler: { id: 'crypt_crawler', name: '地穴爬兽', role: 'melee', bodyColor: '#4B0082', detailColor: '#3B0062', weaponColor: '#666666', size: 26 },
      shadow_assassin: { id: 'shadow_assassin', name: '暗影刺客', role: 'melee', bodyColor: '#2F4F4F', detailColor: '#1F3F3F', weaponColor: '#C0C0C0', size: 24 },
      archer: { id: 'archer', name: '弓箭手', role: 'ranged', bodyColor: '#228B22', detailColor: '#006400', weaponColor: '#8B7355', size: 22 },
      elf_shooter: { id: 'elf_shooter', name: '精灵射手', role: 'ranged', bodyColor: '#98FB98', detailColor: '#3CB371', weaponColor: '#DAA520', size: 24 },
      musketeer: { id: 'musketeer', name: '火枪佣兵', role: 'ranged', bodyColor: '#8B4513', detailColor: '#654321', weaponColor: '#444444', size: 23 },
      ballista: { id: 'ballista', name: '弩炮车', role: 'ranged', bodyColor: '#8B7355', detailColor: '#6B5335', weaponColor: '#444444', size: 35 },
      flame_warlock: { id: 'flame_warlock', name: '火焰术士', role: 'magic', bodyColor: COLORS.fire.body, detailColor: COLORS.fire.detail, weaponColor: '#FFD700', size: 26 },
      ice_witch: { id: 'ice_witch', name: '冰霜女巫', role: 'magic', bodyColor: COLORS.ice.body, detailColor: COLORS.ice.detail, weaponColor: '#E0FFFF', size: 25 },
      plague_thrower: { id: 'plague_thrower', name: '瘟疫投手', role: 'magic', bodyColor: '#556B2F', detailColor: '#3B4A1F', weaponColor: '#8B008B', size: 24 },
      thunder_mage: { id: 'thunder_mage', name: '雷电法师', role: 'magic', bodyColor: '#4169E1', detailColor: '#2F4F8F', weaponColor: '#FFD700', size: 26 },
      griffin_knight: { id: 'griffin_knight', name: '狮鹫骑士', role: 'air', bodyColor: '#DAA520', detailColor: '#B8860B', weaponColor: '#C0C0C0', size: 38 },
      bat_swarm: { id: 'bat_swarm', name: '蝙蝠群', role: 'air', bodyColor: '#4B0082', detailColor: '#3B0062', weaponColor: '#666666', size: 28 },
      young_dragon: { id: 'young_dragon', name: '幼龙', role: 'air', bodyColor: COLORS.dragon.body, detailColor: COLORS.dragon.detail, weaponColor: '#FFD700', size: 36 },
      tree_ancient: { id: 'tree_ancient', name: '树人古卫', role: 'boss', bodyColor: COLORS.tree.body, detailColor: COLORS.tree.detail, weaponColor: '#228B22', size: 52 },
      ogre_lord: { id: 'ogre_lord', name: '食人魔领主', role: 'boss', bodyColor: '#8B4513', detailColor: '#654321', weaponColor: '#666666', size: 55 },
      fire_dragon: { id: 'fire_dragon', name: '火龙', role: 'boss', bodyColor: '#FF4500', detailColor: '#CC3700', weaponColor: '#FFD700', size: 62 },
    };

    const ROLES = [
      { key: 'tank', label: '前排肉盾' },
      { key: 'melee', label: '近战冲锋' },
      { key: 'ranged', label: '远程持续输出' },
      { key: 'magic', label: '法术/范围兵' },
      { key: 'air', label: '空中/特殊兵' },
      { key: 'boss', label: '高费终结兵' },
    ];


    // 创建页面
    const container = document.getElementById('container');
    
    ROLES.forEach(role => {
      const units = Object.entries(UNIT_CONFIGS).filter(([id, config]) => config.role === role.key);
      if (units.length === 0) return;

      const section = document.createElement('div');
      section.className = 'role-section';
      section.innerHTML = `<div class="role-title">${role.label} (${units.length}个)</div>`;

      const grid = document.createElement('div');
      grid.className = 'unit-grid';

      units.forEach(([unitId, config]) => {
        const card = document.createElement('div');
        card.className = `unit-card role-${role.key}`;

        const canvas = document.createElement('canvas');
        canvas.width = 120;
        canvas.height = 120;
        canvas.id = `canvas-${unitId}`;

        const name = document.createElement('div');
        name.className = 'unit-name';
        name.textContent = config.name;

        const roleLabel = document.createElement('div');
        roleLabel.className = 'unit-role';
        roleLabel.textContent = role.label;

        card.appendChild(canvas);
        card.appendChild(name);
        card.appendChild(roleLabel);
        grid.appendChild(card);
      });

      section.appendChild(grid);
      container.appendChild(section);
    });

    // 动画循环
    function renderAll() {
      Object.entries(UNIT_CONFIGS).forEach(([unitId, config]) => {
        const canvas = document.getElementById(`canvas-${unitId}`);
        if (canvas) {
          const ctx = canvas.getContext('2d');
          if (ctx) {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            drawUnitByConfig(ctx, config, 60, 60);
          }
        }
      });
      requestAnimationFrame(renderAll);
    }

    renderAll();
  function drawGoblinShield(ctx, size, bodyColor, detailColor, weaponColor, hpPercent, isAttacking) {
  const now = Date.now();
  const walkBob = Math.sin(now / 150) * 2;
  const attackSwing = isAttacking ? Math.sin(now / 50) * 15 : 0;

  // 佝偻身体（梨形）
  ctx.fillStyle = bodyColor;
  ctx.beginPath();
  ctx.ellipse(0, walkBob, size * 0.25, size * 0.35, 0.1, 0, Math.PI * 2);
  ctx.fill();

  // 破旧皮甲
  ctx.fillStyle = detailColor;
  ctx.beginPath();
  ctx.ellipse(0, size * 0.1 + walkBob, size * 0.2, size * 0.2, 0.1, 0, Math.PI * 2);
  ctx.fill();

  // 头部（歪斜）
  ctx.fillStyle = bodyColor;
  ctx.save();
  ctx.rotate(0.15);
  ctx.beginPath();
  ctx.arc(0, -size * 0.35 + walkBob, size * 0.18, 0, Math.PI * 2);
  ctx.fill();

  // 破旧头盔（带裂缝）
  ctx.fillStyle = '#666666';
  ctx.beginPath();
  ctx.arc(0, -size * 0.4 + walkBob, size * 0.2, Math.PI, 0);
  ctx.fill();
  ctx.strokeStyle = '#333333';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(-size * 0.05, -size * 0.45 + walkBob);
  ctx.lineTo(size * 0.05, -size * 0.35 + walkBob);
  ctx.stroke();

  // 眼睛（一大一小）
  ctx.fillStyle = '#FFD700';
  ctx.beginPath();
  ctx.arc(-size * 0.06, -size * 0.37 + walkBob, size * 0.04, 0, Math.PI * 2);
  ctx.arc(size * 0.08, -size * 0.37 + walkBob, size * 0.03, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();

  // 大圆盾（遮住左半身）
  ctx.fillStyle = '#8B4513';
  ctx.beginPath();
  ctx.arc(-size * 0.3, size * 0.05 + walkBob, size * 0.25, 0, Math.PI * 2);
  ctx.fill();
  ctx.strokeStyle = '#DAA520';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(-size * 0.3, -size * 0.15 + walkBob);
  ctx.lineTo(-size * 0.3, size * 0.25 + walkBob);
  ctx.moveTo(-size * 0.5, size * 0.05 + walkBob);
  ctx.lineTo(-size * 0.1, size * 0.05 + walkBob);
  ctx.stroke();

  // 短剑
  ctx.save();
  ctx.translate(size * 0.2, size * 0.1 + walkBob);
  ctx.rotate((attackSwing * Math.PI / 180));
  ctx.strokeStyle = weaponColor;
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(0, 0);
  ctx.lineTo(size * 0.15, -size * 0.25);
  ctx.stroke();
  ctx.restore();

  // 短腿
  ctx.fillStyle = detailColor;
  ctx.fillRect(-size * 0.12, size * 0.25 + walkBob, size * 0.08, size * 0.15);
  ctx.fillRect(size * 0.04, size * 0.25 + walkBob, size * 0.08, size * 0.15);

  // 血条
  drawHpBar(ctx, size * 0.5, hpPercent, -size * 0.55 + walkBob);
}
function drawOrcHeavy(ctx, size, bodyColor, detailColor, weaponColor, hpPercent, isAttacking) {
  void weaponColor;
  const now = Date.now();
  const walkBob = Math.sin(now / 200) * 3;
  const attackSwing = isAttacking ? Math.sin(now / 60) * 20 : 0;
  void attackSwing;

  // 倒梯形板甲身体
  ctx.fillStyle = detailColor;
  ctx.beginPath();
  ctx.moveTo(-size * 0.35, size * 0.3 + walkBob);
  ctx.lineTo(size * 0.35, size * 0.3 + walkBob);
  ctx.lineTo(size * 0.25, -size * 0.1 + walkBob);
  ctx.lineTo(-size * 0.25, -size * 0.1 + walkBob);
  ctx.fill();

  // 板甲纹理
  ctx.strokeStyle = '#888888';
  ctx.lineWidth = 1;
  for (let i = 0; i < 3; i++) {
    ctx.beginPath();
    ctx.moveTo(-size * 0.2, (-size * 0.05 + i * size * 0.12) + walkBob);
    ctx.lineTo(size * 0.2, (-size * 0.05 + i * size * 0.12) + walkBob);
    ctx.stroke();
  }

  // 肩甲带尖刺
  ctx.fillStyle = '#555555';
  ctx.beginPath();
  ctx.arc(-size * 0.3, -size * 0.15 + walkBob, size * 0.12, 0, Math.PI * 2);
  ctx.arc(size * 0.3, -size * 0.15 + walkBob, size * 0.12, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#888888';
  for (let i = 0; i < 3; i++) {
    ctx.beginPath();
    ctx.moveTo(-size * 0.35 + i * size * 0.05, -size * 0.25 + walkBob);
    ctx.lineTo(-size * 0.3 + i * size * 0.05, -size * 0.35 + walkBob);
    ctx.lineTo(-size * 0.25 + i * size * 0.05, -size * 0.25 + walkBob);
    ctx.fill();
  }

  // 兽人头部（方形）
  ctx.fillStyle = bodyColor;
  ctx.fillRect(-size * 0.15, -size * 0.4 + walkBob, size * 0.3, size * 0.25);

  // 带角头盔
  ctx.fillStyle = '#444444';
  ctx.beginPath();
  ctx.arc(0, -size * 0.42 + walkBob, size * 0.18, Math.PI, 0);
  ctx.fill();
  ctx.fillStyle = '#666666';
  ctx.beginPath();
  ctx.moveTo(-size * 0.15, -size * 0.45 + walkBob);
  ctx.lineTo(-size * 0.2, -size * 0.6 + walkBob);
  ctx.lineTo(-size * 0.1, -size * 0.45 + walkBob);
  ctx.fill();
  ctx.beginPath();
  ctx.moveTo(size * 0.15, -size * 0.45 + walkBob);
  ctx.lineTo(size * 0.2, -size * 0.6 + walkBob);
  ctx.lineTo(size * 0.1, -size * 0.45 + walkBob);
  ctx.fill();

  // 凶恶眼睛
  ctx.fillStyle = '#FF0000';
  ctx.beginPath();
  ctx.arc(-size * 0.06, -size * 0.35 + walkBob, size * 0.04, 0, Math.PI * 2);
  ctx.arc(size * 0.06, -size * 0.35 + walkBob, size * 0.04, 0, Math.PI * 2);
  ctx.fill();

  // 獠牙
  ctx.fillStyle = '#FFFFCC';
  ctx.beginPath();
  ctx.moveTo(-size * 0.08, -size * 0.25 + walkBob);
  ctx.lineTo(-size * 0.06, -size * 0.18 + walkBob);
  ctx.lineTo(-size * 0.04, -size * 0.25 + walkBob);
  ctx.fill();
  ctx.beginPath();
  ctx.moveTo(size * 0.04, -size * 0.25 + walkBob);
  ctx.lineTo(size * 0.06, -size * 0.18 + walkBob);
  ctx.lineTo(size * 0.08, -size * 0.25 + walkBob);
  ctx.fill();

  // 双手巨斧
  ctx.save();
  ctx.translate(size * 0.25, -size * 0.1 + walkBob);
  ctx.rotate((attackSwing * Math.PI / 180));
  ctx.strokeStyle = '#8B7355';
  ctx.lineWidth = 4;
  ctx.beginPath();
  ctx.moveTo(0, 0);
  ctx.lineTo(size * 0.1, -size * 0.5);
  ctx.stroke();
  ctx.fillStyle = '#888888';
  ctx.beginPath();
  ctx.moveTo(size * 0.1, -size * 0.5);
  ctx.quadraticCurveTo(size * 0.3, -size * 0.55, size * 0.1, -size * 0.6);
  ctx.fill();
  ctx.beginPath();
  ctx.moveTo(size * 0.1, -size * 0.5);
  ctx.quadraticCurveTo(-size * 0.1, -size * 0.55, size * 0.1, -size * 0.6);
  ctx.fill();
  ctx.restore();

  // 铁靴
  ctx.fillStyle = '#555555';
  ctx.fillRect(-size * 0.2, size * 0.25 + walkBob, size * 0.15, size * 0.15);
  ctx.fillRect(size * 0.05, size * 0.25 + walkBob, size * 0.15, size * 0.15);

  drawHpBar(ctx, size * 0.6, hpPercent, -size * 0.65 + walkBob);
}
function drawStoneGuard(ctx, size, bodyColor, detailColor, weaponColor, hpPercent, isAttacking) {
  const now = Date.now();
  const walkBob = Math.sin(now / 300) * 1;
  const attackSwing = isAttacking ? Math.sin(now / 80) * 10 : 0;

  // 方块身体
  ctx.fillStyle = bodyColor;
  ctx.fillRect(-size * 0.3, -size * 0.1 + walkBob, size * 0.6, size * 0.45);

  // 石头裂纹
  ctx.strokeStyle = detailColor;
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(-size * 0.2, 0 + walkBob);
  ctx.lineTo(size * 0.1, size * 0.1 + walkBob);
  ctx.lineTo(size * 0.25, -size * 0.05 + walkBob);
  ctx.stroke();

  // 石像鬼头部
  ctx.fillStyle = bodyColor;
  ctx.fillRect(-size * 0.2, -size * 0.4 + walkBob, size * 0.4, size * 0.3);

  // 角
  ctx.fillStyle = detailColor;
  ctx.beginPath();
  ctx.moveTo(-size * 0.15, -size * 0.4 + walkBob);
  ctx.lineTo(-size * 0.2, -size * 0.55 + walkBob);
  ctx.lineTo(-size * 0.05, -size * 0.4 + walkBob);
  ctx.fill();
  ctx.beginPath();
  ctx.moveTo(size * 0.15, -size * 0.4 + walkBob);
  ctx.lineTo(size * 0.2, -size * 0.55 + walkBob);
  ctx.lineTo(size * 0.05, -size * 0.4 + walkBob);
  ctx.fill();

  // 发光眼睛（脉冲）
  const glow = 0.5 + Math.sin(now / 500) * 0.5;
  ctx.fillStyle = `rgba(255, 255, 0, ${glow})`;
  ctx.beginPath();
  ctx.arc(-size * 0.08, -size * 0.3 + walkBob, size * 0.05, 0, Math.PI * 2);
  ctx.arc(size * 0.08, -size * 0.3 + walkBob, size * 0.05, 0, Math.PI * 2);
  ctx.fill();

  // 石柱腿
  ctx.fillStyle = detailColor;
  ctx.fillRect(-size * 0.2, size * 0.3 + walkBob, size * 0.15, size * 0.2);
  ctx.fillRect(size * 0.05, size * 0.3 + walkBob, size * 0.15, size * 0.2);

  // 石剑
  ctx.save();
  ctx.translate(size * 0.35, size * 0.1 + walkBob);
  ctx.rotate((attackSwing * Math.PI / 180));
  ctx.fillStyle = weaponColor;
  ctx.fillRect(-size * 0.05, -size * 0.4, size * 0.1, size * 0.5);
  ctx.restore();

  // 石盾
  ctx.fillStyle = bodyColor;
  ctx.fillRect(-size * 0.45, -size * 0.15 + walkBob, size * 0.15, size * 0.35);
  ctx.strokeStyle = detailColor;
  ctx.lineWidth = 2;
  ctx.strokeRect(-size * 0.45, -size * 0.15 + walkBob, size * 0.15, size * 0.35);

  drawHpBar(ctx, size * 0.6, hpPercent, -size * 0.6 + walkBob);
}
function drawDwarfIronwall(ctx, size, bodyColor, detailColor, weaponColor, hpPercent, isAttacking) {
  void weaponColor;
  const now = Date.now();
  const walkBob = Math.sin(now / 120) * 2;
  const attackSwing = isAttacking ? Math.sin(now / 50) * 18 : 0;
  void attackSwing;

  // 桶形身体
  ctx.fillStyle = bodyColor;
  ctx.beginPath();
  ctx.ellipse(0, size * 0.05 + walkBob, size * 0.3, size * 0.35, 0, 0, Math.PI * 2);
  ctx.fill();

  // 锁子甲纹理
  ctx.strokeStyle = detailColor;
  ctx.lineWidth = 1;
  for (let r = 0; r < 4; r++) {
    for (let c = 0; c < 5; c++) {
      ctx.beginPath();
      ctx.arc(-size * 0.2 + c * size * 0.1, -size * 0.1 + r * size * 0.1 + walkBob, size * 0.04, 0, Math.PI * 2);
      ctx.stroke();
    }
  }

  // 圆脸
  ctx.fillStyle = '#DEB887';
  ctx.beginPath();
  ctx.arc(0, -size * 0.3 + walkBob, size * 0.18, 0, Math.PI * 2);
  ctx.fill();

  // 头盔带护鼻
  ctx.fillStyle = '#888888';
  ctx.beginPath();
  ctx.arc(0, -size * 0.35 + walkBob, size * 0.2, Math.PI, 0);
  ctx.fill();
  ctx.fillRect(-size * 0.03, -size * 0.35 + walkBob, size * 0.06, size * 0.15);

  // 大胡子
  ctx.fillStyle = '#8B4513';
  ctx.beginPath();
  ctx.moveTo(-size * 0.15, -size * 0.25 + walkBob);
  ctx.quadraticCurveTo(-size * 0.2, size * 0.05 + walkBob, -size * 0.1, size * 0.1 + walkBob);
  ctx.lineTo(size * 0.1, size * 0.1 + walkBob);
  ctx.quadraticCurveTo(size * 0.2, size * 0.05 + walkBob, size * 0.15, -size * 0.25 + walkBob);
  ctx.fill();

  // 眼睛
  ctx.fillStyle = '#000000';
  ctx.beginPath();
  ctx.arc(-size * 0.06, -size * 0.32 + walkBob, size * 0.03, 0, Math.PI * 2);
  ctx.arc(size * 0.06, -size * 0.32 + walkBob, size * 0.03, 0, Math.PI * 2);
  ctx.fill();

  // 塔盾
  ctx.fillStyle = '#666666';
  ctx.beginPath();
  ctx.moveTo(-size * 0.45, -size * 0.3 + walkBob);
  ctx.lineTo(-size * 0.35, -size * 0.3 + walkBob);
  ctx.lineTo(-size * 0.3, size * 0.2 + walkBob);
  ctx.lineTo(-size * 0.5, size * 0.2 + walkBob);
  ctx.fill();
  ctx.fillStyle = '#DAA520';
  ctx.fillRect(-size * 0.42, -size * 0.1 + walkBob, size * 0.1, size * 0.1);

  // 战锤
  ctx.save();
  ctx.translate(size * 0.3, size * 0.1 + walkBob);
  ctx.rotate((attackSwing * Math.PI / 180));
  ctx.strokeStyle = '#8B7355';
  ctx.lineWidth = 4;
  ctx.beginPath();
  ctx.moveTo(0, 0);
  ctx.lineTo(size * 0.05, -size * 0.35);
  ctx.stroke();
  ctx.fillStyle = '#888888';
  ctx.fillRect(-size * 0.08, -size * 0.4, size * 0.16, size * 0.1);
  ctx.restore();

  // 短粗腿
  ctx.fillStyle = detailColor;
  ctx.fillRect(-size * 0.15, size * 0.3 + walkBob, size * 0.1, size * 0.12);

  const hpColor = hpPercent > 0.6 ? '#4CAF50' : hpPercent > 0.3 ? '#FF9800' : '#F44336';

  ctx.fillRect(-width / 2, y, width * hpPercent, 4);
  ctx.strokeStyle = '#000000';
  ctx.lineWidth = 1;
  ctx.strokeRect(-width / 2, y, width, 4);
}
