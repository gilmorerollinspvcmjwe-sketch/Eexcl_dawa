<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>奇幻战线 - 兵种预览</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Microsoft YaHei', sans-serif;
      background: #1a1a2e;
      color: #eee;
      padding: 20px;
    }
    h1 {
      text-align: center;
      margin-bottom: 30px;
      color: #FFD700;
      font-size: 28px;
    }
    .role-section {
      margin-bottom: 40px;
    }
    .role-title {
      font-size: 20px;
      color: #4A90D9;
      margin-bottom: 15px;
      padding-left: 10px;
      border-left: 4px solid #4A90D9;
    }
    .unit-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap: 15px;
    }
    .unit-card {
      background: #16213e;
      border-radius: 8px;
      padding: 15px;
      text-align: center;
      transition: transform 0.2s;
    }
    .unit-card:hover {
      transform: scale(1.05);
    }
    .unit-card canvas {
      background: #0f3460;
      border-radius: 4px;
      margin-bottom: 10px;
    }
    .unit-name {
      font-size: 14px;
      color: #eee;
      margin-bottom: 5px;
    }
    .unit-role {
      font-size: 12px;
      color: #888;
    }
    .role-tank { border-top: 3px solid #808080; }
    .role-melee { border-top: 3px solid #CD853F; }
    .role-ranged { border-top: 3px solid #228B22; }
    .role-magic { border-top: 3px solid #9C27B0; }
    .role-air { border-top: 3px solid #87CEEB; }
    .role-boss { border-top: 3px solid #FF4500; }
  </style>
</head>
<body>
  <h1>奇幻战线对推 - 兵种预览</h1>
  <div id="container"></div>

  <script type="module">
    import { UNIT_CONFIGS, drawUnitOnCanvas, getUnitsByRole } from './unitRenderer.ts';

    const container = document.getElementById('container');
    const roles = [
      { key: 'tank', label: '前排肉盾' },
      { key: 'melee', label: '近战冲锋' },
      { key: 'ranged', label: '远程持续输出' },
      { key: 'magic', label: '法术/范围兵' },
      { key: 'air', label: '空中/特殊兵' },
      { key: 'boss', label: '高费终结兵' },
    ];

    roles.forEach(role => {
      const units = getUnitsByRole(role.key);
      if (units.length === 0) return;

      const section = document.createElement('div');
      section.className = 'role-section';
      section.innerHTML = `<div class="role-title">${role.label} (${units.length}个)</div>`;

      const grid = document.createElement('div');
      grid.className = 'unit-grid';

      units.forEach(unitId => {
        const config = UNIT_CONFIGS[unitId];
        const card = document.createElement('div');
        card.className = `unit-card role-${role.key}`;

        const canvas = document.createElement('canvas');
        canvas.width = 120;
        canvas.height = 120;
        canvas.id = `canvas-${unitId}`;

        const name = document.createElement('div');
        name.className = 'unit-name';
        name.textContent = config.name;

        const roleLabel = document.createElement('div');
        roleLabel.className = 'unit-role';
        roleLabel.textContent = `${role.label}`;

        card.appendChild(canvas);
        card.appendChild(name);
        card.appendChild(roleLabel);
        grid.appendChild(card);
      });

      section.appendChild(grid);
      container.appendChild(section);
    });

    // 绘制所有单位
    function renderAll() {
      Object.keys(UNIT_CONFIGS).forEach(unitId => {
        const canvas = document.getElementById(`canvas-${unitId}`);
        if (canvas) {
          const ctx = canvas.getContext('2d');
          if (ctx) {
            drawUnitOnCanvas(ctx, unitId, 60, 60, 1.0, false);
          }
        }
      });
      requestAnimationFrame(renderAll);
    }

    renderAll();
  </script>
</body>
</html>
